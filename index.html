<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZenFlow // Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --font-main: 'Inter', system-ui, sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
            --base-font-size: 16px;
        }
        html { font-size: var(--base-font-size); }
        body { font-family: var(--font-main); transition: background-color 0.3s ease; }
        .mono { font-family: var(--font-mono); }
        
        [data-theme="dark"] {
            --bg: #0F172A; --surface: #1E293B; --text: #F1F5F9; --text-mute: #94A3B8; --border: #334155;
        }
        [data-theme="light"] {
            --bg: #F8FAFC; --surface: #FFFFFF; --text: #1E293B; --text-mute: #64748B; --border: #E2E8F0;
        }
        body { background-color: var(--bg); color: var(--text); }
        .surface { background-color: var(--surface); border: 1px solid var(--border); }
        .text-mute { color: var(--text-mute); }
        
        .stagger-in {
            animation: fadeInUp 0.5s ease forwards;
            opacity: 0;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Settings Modal Styles */
        #settings-modal {
            backdrop-filter: blur(8px);
            transition: opacity 0.2s ease;
        }
        .modal-content {
            transform: scale(0.95);
            transition: transform 0.2s ease;
        }
        #settings-modal.active {
            opacity: 1;
            pointer-events: auto;
        }
        #settings-modal.active .modal-content {
            transform: scale(1);
        }
    </style>
</head>
<body class="min-h-screen p-6 md:p-12">
    <!-- Settings Button (Replaced Theme Toggle) -->
    <button id="settings-btn" 
            class="fixed top-6 right-6 p-2 surface rounded-full hover:scale-110 transition-transform z-50 text-xl">
        ⚙️
    </button>

    <!-- Settings Modal -->
    <div id="settings-modal" class="fixed inset-0 z-[60] hidden flex items-center justify-center p-4 opacity-0 pointer-events-none">
        <div class="absolute inset-0 bg-slate-900/60" onclick="toggleSettings()"></div>
        <div class="modal-content surface w-full max-w-md rounded-3xl p-8 relative z-10 shadow-2xl">
            <div class="flex justify-between items-center mb-8">
                <h3 class="text-xl font-semibold">Settings</h3>
                <button onclick="toggleSettings()" class="text-mute hover:text-text text-2xl">&times;</button>
            </div>
            
            <div class="space-y-6">
                <!-- Theme Section -->
                <div class="space-y-3">
                    <label class="text-xs font-medium uppercase tracking-widest text-mute">Appearance</label>
                    <div class="grid grid-cols-3 gap-2">
                        <button onclick="setTheme('dark')" class="p-2 surface rounded-lg text-sm hover:ring-2 ring-indigo-500 transition-all">Dark</button>
                        <button onclick="setTheme('light')" class="p-2 surface rounded-lg text-sm hover:ring-2 ring-indigo-500 transition-all">Light</button>
                        <button onclick="setTheme('system')" class="p-2 surface rounded-lg text-sm hover:ring-2 ring-indigo-500 transition-all">System</button>
                    </div>
                </div>

                <!-- Font Size Section -->
                <div class="space-y-3">
                    <label class="text-xs font-medium uppercase tracking-widest text-mute">Font Size</label>
                    <div class="grid grid-cols-3 gap-2">
                        <button onclick="setFontSize('small')" class="p-2 surface rounded-lg text-sm hover:ring-2 ring-indigo-500 transition-all">Small</button>
                        <button onclick="setFontSize('medium')" class="p-2 surface rounded-lg text-sm hover:ring-2 ring-indigo-500 transition-all">Medium</button>
                        <button onclick="setFontSize('large')" class="p-2 surface rounded-lg text-sm hover:ring-2 ring-indigo-500 transition-all">Large</button>
                    </div>
                </div>

                <!-- Search Engine Section -->
                <div class="space-y-3">
                    <label class="text-xs font-medium uppercase tracking-widest text-mute">Default Search Engine</label>
                    <select id="search-engine-select" onchange="setSearchEngine(this.value)" 
                            class="w-full p-3 surface rounded-xl outline-none focus:ring-2 ring-indigo-500 transition-all text-sm">
                        <!-- Options injected by JS -->
                    </select>
                </div>

                <!-- UI Toggles -->
                <div class="space-y-3">
                    <label class="text-xs font-medium uppercase tracking-widest text-mute">UI Options</label>
                    <div class="flex items-center justify-between surface p-3 rounded-xl">
                        <span class="text-sm">Show Footer Clock</span>
                        <input type="checkbox" id="clock-toggle" onchange="toggleClock(this.checked)" class="w-4 h-4 accent-indigo-500">
                    </div>
                </div>
            </div>

            <div class="mt-8 pt-6 border-t border-slate-500/20 text-center">
                <p class="text-xs text-mute mono">ZenFlow v1.1 // Local Settings Enabled</p>
            </div>
        </div>
    </div>

    <div class="max-w-5xl mx-auto">
        <!-- Header & Search -->
        <header class="text-center mb-16 space-y-6">
            <h1 id="welcome-text" class="text-4xl font-semibold tracking-tight opacity-0 transition-all duration-700">...</h1>
            <div class="relative max-w-2xl mx-auto group">
                <input type="text" id="search-input" placeholder="Search anything... (Press / to focus)" 
                       class="w-full px-6 py-4 surface rounded-2xl text-lg outline-none focus:ring-2 ring-indigo-500 transition-all shadow-sm" />
                <div class="absolute right-4 top-1/2 -translate-y-1/2 flex gap-2">
                    <span class="px-2 py-1 text-xs surface rounded border border-slate-500 text-mute mono">⌘ K</span>
                </div>
            </div>
        </header>

        <!-- Main Grid -->
        <main id="links-grid" class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <!-- Categories will be injected here -->
        </main>

        <!-- Bottom Status -->
        <footer id="footer-status" class="mt-20 pt-6 border-t border-slate-500/20 flex justify-between items-center text-mute mono text-xs">
            <div id="clock">00:00:00</div>
            <div class="opacity-60">
                ZenFlow v1.1 // Designed by 二月
            </div>
        </footer>
    </div>

    <script src="config.js"></script>
    <script>
        let config = {};

        async function init() {
            try {
                config = window.ZENFLOW_CONFIG;
                
                loadStoredSettings();
                renderWelcome();
                renderLinks();
                setupSearch();
                startClock();
                
                document.getElementById('welcome-text').classList.remove('opacity-opacity-0');
                document.getElementById('welcome-text').classList.add('stagger-in');
            } catch (e) {
                console.error("Failed to load config:", e);
                document.getElementById('welcome-text').innerText = "Error loading configuration";
            }
        }

        function renderWelcome() {
            const hour = new Date().getHours();
            let msg = config.user.welcome_messages.evening;
            if (hour < 12) msg = config.user.welcome_messages.morning;
            else if (hour < 18) msg = config.user.welcome_messages.afternoon;
            
            document.getElementById('welcome-text').innerText = msg;
        }

        function renderLinks() {
            const grid = document.getElementById('links-grid');
            grid.innerHTML = config.categories.map((cat, catIdx) => `
                <section class="space-y-4 stagger-in" style="animation-delay: ${catIdx * 150}ms">
                    <h2 class="text-xs font-medium uppercase tracking-widest text-mute px-2">${cat.name}</h2>
                    <div class="grid grid-cols-2 gap-3">
                        ${cat.links.map(link => `
                            <a href="${link.url}" target="_blank" class="surface p-4 rounded-xl hover:-translate-y-1 transition-all group">
                                <div class="text-2xl mb-2 group-hover:scale-110 transition-transform">${link.icon}</div>
                                <div class="text-sm font-medium">${link.name}</div>
                            </a>
                        `).join('')}
                    </div>
                </section>
            `).join('');
        }

        function setupSearch() {
            const input = document.getElementById('search-input');
            
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    const query = input.value.trim();
                    if (!query) return;

                    const shortcutMatch = query.match(/^\/([a-z]+)\s*(.*)/);
                    if (shortcutMatch) {
                        const [_, key, term] = shortcutMatch;
                        const url = config.search_engines.shortcuts[key];
                        if (url) {
                            window.open(url + encodeURIComponent(term), '_blank');
                            input.value = '';
                            return;
                        }
                    }
                    
                    const preferredEngine = localStorage.getItem('zenflow-search-engine') || config.search_engines.default;
                    window.open(preferredEngine + encodeURIComponent(query), '_blank');
                    input.value = '';
                }
            });

            window.addEventListener('keydown', (e) => {
                if (e.key === '/' && document.activeElement !== input) {
                    e.preventDefault();
                    input.focus();
                }
            });
        }

        function startClock() {
            const clockEl = document.getElementById('clock');
            const update = () => {
                clockEl.innerText = new Date().toLocaleTimeString('en-US', { hour12: false });
            };
            setInterval(update, 1000);
            update();
        }

        // --- Settings Logic ---

        function toggleSettings() {
            const modal = document.getElementById('settings-modal');
            modal.classList.toggle('hidden');
            setTimeout(() => modal.classList.toggle('active'), 10);
        }

        function setTheme(theme) {
            if (theme === 'system') {
                const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
            } else {
                document.documentElement.setAttribute('data-theme', theme);
            }
            localStorage.setItem('zenflow-theme', theme);
        }

        function setFontSize(size) {
            const sizes = {
                'small': '14px',
                'medium': '16px',
                'large': '18px'
            };
            document.documentElement.style.setProperty('--base-font-size', sizes[size]);
            localStorage.setItem('zenflow-font-size', size);
        }

        function setSearchEngine(url) {
            localStorage.setItem('zenflow-search-engine', url);
        }

        function toggleClock(show) {
            const footer = document.getElementById('footer-status');
            footer.style.display = show ? 'flex' : 'none';
            localStorage.setItem('zenflow-show-clock', show);
        }

        function loadStoredSettings() {
            // Theme
            const savedTheme = localStorage.getItem('zenflow-theme') || 'dark';
            setTheme(savedTheme);

            // Font Size
            const savedSize = localStorage.getItem('zenflow-font-size') || 'medium';
            setFontSize(savedSize);

            // Search Engine Select
            const select = document.getElementById('search-engine-select');
            const engines = {
                'Google': config.search_engines.default,
                'GitHub': config.search_engines.shortcuts.gh,
                'arXiv': config.search_engines.shortcuts.ar,
                'Bing': config.search_engines.shortcuts.b
            };
            
            select.innerHTML = Object.entries(engines).map(([name, url]) => 
                `<option value="${url}">${name}</option>`
            ).join('');
            
            const savedEngine = localStorage.getItem('zenflow-search-engine');
            if (savedEngine) {
                select.value = savedEngine;
            } else {
                select.value = config.search_engines.default;
            }

            // Clock
            const showClock = localStorage.getItem('zenflow-show-clock') !== 'false';
            document.getElementById('clock-toggle').checked = showClock;
            toggleClock(showClock);
        }

        document.getElementById('settings-btn').addEventListener('click', toggleSettings);

        init();
    </script>
</body>
</html>
